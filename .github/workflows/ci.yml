name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: reservation_terrain
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test Backend
      working-directory: ./Desktop/gestion-de-reservation-d-un-terrain-de-proximite-main/gestion-de-reservation-d-un-terrain-de-proximite-main/backend
      env:
        # Overriding the .example properties with live CI database info
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/reservation_terrain
        SPRING_DATASOURCE_USERNAME: user
        SPRING_DATASOURCE_PASSWORD: password
        SPRING_JPA_HIBERNATE_DDL_AUTO: update
      run: |
        chmod +x mvnw
        ./mvnw clean install
